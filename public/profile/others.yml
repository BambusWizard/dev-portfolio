  - cover: images/other/inventory-tool/cover.webm
    title: Модуль инвентаря
    category: Инструменты
    bodyText: |-
      ### Как устроен инвентарный модуль?               
      
      Этот пакет я делал для себя и для будущих проектов - по сути, это база данных предметов, которую не хочется переписывать с нуля каждый раз, когда начинаешь новый проект.
      
      Идея в том, что предмет (ItemData) сам по себе почти пустой - только имя, иконка и guid. Вся его "суть" - это набор модулей (ItemModule), которые к нему прицеплены: WeaponModule, ConsumableModule и любые другие, какие понадобятся в конкретном проекте. Модули не нужно нигде регистрировать вручную - редактор сам находит все классы-наследники ItemModule через рефлексию (TypeCache/Activator.CreateInstance) и показывает их в списке "добавить модуль". Написал новый класс и он тут же появился в редакторе.
      
      Поиск по базе предметов сделан по тому же принципу, что и поиск компонентов в самом Unity: можно искать по имени, а можно фильтровать по модулям через префиксы +/-. Например, "+weapon -consumable зелье" найдет все предметы с оружейным модулем, без модуля расходников и с "зелье" в названии. Все токены складываются по "И", так что фильтры можно комбинировать как угодно.
      
      Отдельно хочется написать про автоматизацию в инспекторе: если выделить сразу несколько предметов, редактор сам построит объединенный список модулей и позволит массово добавлять/убирать модуль или редактировать одно и то же поле сразу у всех выбранных - через SerializedProperty, без ручного перебора. Иконка тоже подтягивается автоматически: если у модуля есть  поле со спрайтом, помеченное [ModuleIcon], она приоритетнее иконки самого предмета - то есть, например, спрайт из WeaponModule сам всплывет в списке предметов.
      
      Ссылки на предметы из других систем (сохранения, квесты, дроп) идут не прямой ссылкой на объект, а через ItemReference - обертку над guid, которая ничего не знает о владении или сохранении, только умеет найти себя в ItemDatabase.Main. Для выбора предмета в инспекторе есть свой AdvancedDropdown с поиском - тот же виджет, что у Unity под капотом для Add Component, так что он остается быстрым даже на тысячах предметов.
  
