    bodyText: |-
      ### О чем эта карточка?
      
      О пользе автоматизации и удобных инструментах. Это может быть валидация состояния проекта перед релизной сборкой (Например, не забыть отключить DEV функционал или же просто валидация данных по проекту). Или же удобный редактор для ScriptableObject, который является базой данных.
      Небольшой стандарт, который я выработал за годы разработки: если есть что-то, что занимает много времени - это нужно упростить. Если проблема требует создания сложного инструмента - согласование. Если же это простое удобство в работе (или сиюминутный парсер чего-то), можно воспользоваться ИИ, занимает 5 минут, но спасает часы монотонной работы.
      Иногда бывает так, что проект существует долгое время, поэтому приходится идти на компромиссы и работать с тем, что есть. В таких ситуациях спасают удобные инструменты, упрощающие работу всем.
      
      Реальные use-кейсы:
      - На давно существующем проекте были разбросаны сцены по разным папкам. Я не знал, есть ли hard-coded пути к ним на проекте. Найти нужную сцену даже по поиску занимало время, а переключаться между ними нужно было часто. Простое решение - создать окошко, которое само ищет сцены, пишет к ним пути, по клику открывает сцену, а также сортирует избранные сцены.
      - Схожая история со сценами: чтобы запустить проект необходимо было открывать определенную сцену. Это мешало при работе с конкретной сценой. Небольшой инструмент помог задать нужную сцену через селектор и при запуске с любой сцены игра запускалась с выбранной сцены.
      - Иногда на проектах ScriptableObjects используется как база данных, содержащая элементы в списке. Иногда это бывает удобно, но работать с большим количеством данных сложно. К примеру, на своих проектах я использую именно SO для хранения данных. И чтобы работать было легче я создаю свои инспекторы для этих баз данных - работать с определенным элементом становится проще!
      
      В этой карточке я хотел поделиться своим опытом. Создавать инструменты легко, главное согласовать с отделами - чаще всего бывает так, что их будут использовать даже ГД, поэтому важно учесть все пожелания и в особенности получить разрешение ПМ или других руководителей:)
  
