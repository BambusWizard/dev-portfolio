  - cover: images/other/blender/blender.png
    title: Blender
    category: Навыки
    bodyText: |-
      ### О чем эта карточка?
      
      В целом меня всегда интересовала разработка игр, поэтому я всегда пользовался всеми инструментами, включая те, в которых можно работать с 3D графикой.
      
      В последнее время (чуть больше года) я работаю на проекте работодателя, где я отвечаю почти за все: звук, спрайты, 3D модели. Поскольку на весь проект это 3D игра, то и модели персонажей, окружения часто приходится подгонять под этот мобильный проект.
      Это могут быть как оптимизации моделей (merge вершин на плохих моделях, оптимизация loop cut, топология, UV развертка), так и наложение скелета, вес на конечностях (даже на моделях, которые не особо подходят под человеческий скелет.
      
      За это время я научился нормализовать направления вершин, исправлять графические артефакты, вырезать вшитые данные из кривых моделек и многое другое, а приобретенные знания помогают мне лучше понимать то, как Unity работает с моделями:)

