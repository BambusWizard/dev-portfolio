    category: Прототипы
    bodyText: |-
      ### Личный проект
      
      Аркадная игра, где нужно собирать сегменты змейки и выбирать наиболее оптимальный путь, обходя ловушки. Бесконечная генерация уровня, зависящая от силы игрока и включенных модификаторов геймплея.
      
      **Ключевые особенности:**
      - **геймплей:** в игре есть модификаторы - открываются от уровня игрока и могут быть активированы, чтобы получать больше монет и опыта, но значительно усложнив игру;
      - **прогрессия:** скины, модификаторы и ловушки открываются в зависимости от уровня игрока;
      - **кастомизация:** разработал гибкую систему скинов: комбинация цветов или градиент, основанный на жизни игрока, форма сегментов змейки - все можно купить за монеты;
      - **оптимизация:** использовал Object Pooling, параллельная загрузка модулей игры и другое.
