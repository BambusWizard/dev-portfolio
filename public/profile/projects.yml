      - images/projects/cat-tennis/intro.webm
    title: 'Cat Tennis: All Stars'
    category: Мобильные игры
    bodyText: |-
      ### Личный проект
      
      Динамичный спортивный симулятор по мотивам популярных интернет-трендов. Игроки сражаются в теннис против различных смешных персонажей в режиме прогрессирующей сложности.
      
      **Ключевые особенности:**
      - **ритм-механика:** события и действия ИИ привязаны к темпу музыкального сопровождения;
      - **кастомный редактор:** для удобной разработки контента создал инструмент, в котором можно выбрать тем музыки, на основе которого будут привязываться атаки ИИ;
      - **прогрессия:** игра поделена на главы со своим прогрессом, основанным на счете игрока против каждого противника, а в конце глав сложные боссы; 
      - **геймплей:** отзывчивое управление, инвентарь игрока с кастомизацией, меняющиеся локации в тематических главах игры;
      - **визуал:** красивые VFX-эффекты, тактильная отдача от игровых событий и плавные анимации;
      - **roadmap:** в разработке находятся сезонные события, контент для глав и многое другое.
    links:
